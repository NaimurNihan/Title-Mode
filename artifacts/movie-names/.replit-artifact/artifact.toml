kind = "web"
previewPath = "/"
title = "Movie Names Tracker"
version = "1.0.0"
id = "artifacts/movie-names"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21965

[services.development]
run = "pnpm --filter @workspace/movie-names run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/movie-names", "run", "build" ]
publicDir = "artifacts/movie-names/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21965"
BASE_PATH = "/"
